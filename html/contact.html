<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Information</title>
</head>
<body>


    <h2>Contact</h2>


<form method ="post">   
        <fieldset>
            <legend>Contact Form</legend>
            <table>
                <tr>
                    <td>
                        <label for="firstname">First Name:</label>
                    </td>
                    <td>
                        <input type ="text" id="firstname" name="firstname" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="lastname">Last Name: </label>
                    </td>
                    <td>
                        <input type ="text" id="lastname" name="lastname" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for = "gender">Gender</label>
                    </td>
                    <td>
                        <input type="radio" name="gender" value="male">Male
                        <input type="radio" name="gender" value="female">Female
                        <input type="radio" name="gender" value="other">Other
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="email">Email: </label>
                    </td>
                    <td>
                        <input type="email" id="email" name="email" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Services">Willing to work with</label>
                    </td>
                    <td>
                        <input type="checkbox" name="services" value="web_development">Web Development
                        <input type="checkbox" name="services" value="ai/ml">AI/ML
                        <input type="checkbox" name="services" value="backend">Backend
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="reason">Reason for contact</label>
                    </td>
                    <td>
                        <select name="reason" id="reason">
                            <option value="" selected>Select any of the following</option>
                            <option value="job">Job</option>
                            <option value="project">Project</option>
                            <option value="thesis">Thesis</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="booking">Booking Date</label>
                    </td>
                    <td>
                        <input type="datetime-local" id="booking" name="booking">
                    </td>
                </tr>
                <tr>
                    <td>

                    </td>
                    <td>
                        <button type="submit">Submit</button>
                        <button type="reset">Reset</button>
                    </td>
                </tr>


            </table>




        </fieldset>




    </form>
