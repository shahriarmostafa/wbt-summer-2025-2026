<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Create your account</h2>
    <p>Join us in couple steps</p>
    <form method="post">
        <div class="field">
            <label for="fullname">Full Name</label>
            <input type="text" name="fullname">
        </div>
        <div class="field">
            <label for="age">Age</label>
            <input type="number" name="age">
        </div>
        <div class="field">
            <label for="dob">Date of Birth</label>
            <input type="datetime-local" name="dob">
        </div>
        <div class="field">
            <label for="dob">Email Address</label>
            <input type="email" name="email">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" name="password">
        </div>
        <div class="field">
            <label for="country">Preffered Contact</label>
            <input type="radio" name="email"> <label for="email"></label>
            <input type="radio" name="phone"> <label for="phone"></label>
            <input type="radio" name="sms"> <label for="sms"></label>
        </div>
        <div class="field">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>
</body>
</html>
